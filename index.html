<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ClawLaw</title>

<style>
:root { color-scheme: dark; }

body{
  margin:0;
  background:
    radial-gradient(1200px 800px at 50% 10%, rgba(255,255,255,.08), transparent 55%),
    radial-gradient(900px 700px at 50% 120%, rgba(255,77,109,.12), transparent 60%),
    #0b0b0f;
  color:#e9e9f2;
  font-family: ui-serif, Georgia, serif;
  display:flex;
  min-height:100vh;
  align-items:center;
  justify-content:center;
  padding:22px;
  text-align:center;
}

.wrap{ width:min(920px, 100%); }

.card{
  background: linear-gradient(180deg, rgba(20,20,29,.92), rgba(16,16,24,.92));
  border:1px solid rgba(38,38,58,.9);
  border-radius:18px;
  overflow:hidden;
  box-shadow:
    0 18px 60px rgba(0,0,0,.55),
    0 1px 0 rgba(255,255,255,.04) inset;
}

.bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 16px;
  border-bottom:1px solid rgba(38,38,58,.9);
}

.leftBar{
  display:flex;
  align-items:center;
  gap:10px;
}

.pill{
  font-family: ui-monospace, monospace;
  font-size:12px;
  border:1px solid rgba(43,43,58,.95);
  border-radius:999px;
  padding:8px 12px;
  background: rgba(17,17,26,.85);
}

.pad{ padding:22px; }

/* NEW: Distinct outlined CLAWLAW */
.brandTitle{
  font-size:64px;
  font-weight:900;
  letter-spacing:6px;
  margin: 6px 0 10px;
  text-transform: uppercase;

  color:#ffffff;

  /* Outline effect */
  -webkit-text-stroke: 1px rgba(255,255,255,.25);

  /* Glow + depth */
  text-shadow:
    0 0 8px rgba(255,255,255,.15),
    0 0 24px rgba(255,255,255,.08),
    0 8px 30px rgba(0,0,0,.6);
}

.servedTitle{
  font-size:42px;
  margin:0;
  opacity:.92;
}

.subtitle{
  opacity:.78;
  margin:12px auto 0;
  max-width:52ch;
}

.divider{
  width:120px;
  height:2px;
  margin:16px auto;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
}

.logoSpotlight{
  margin:18px auto;
  width:min(520px, 92%);
  border-radius:18px;
  padding:18px;
  background:
    radial-gradient(140px 140px at 50% 35%, rgba(255,255,255,.22), transparent 65%),
    rgba(12,12,18,.45);
  border:1px solid rgba(38,38,58,.9);
}

.servedLogo{
  width:min(320px, 72vw);
  display:block;
  margin:auto;
}

/* Buttons */
.btns{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

button{
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px 16px;
  font-weight:700;
  cursor:pointer;
}

.primary{
  background: linear-gradient(180deg, rgba(255,77,109,1), rgba(216,54,87,1));
  color:white;
}

.ghost{
  background: rgba(58,58,82,.55);
  color:white;
}

.backBtn{
  background: rgba(58,58,82,.55);
  color:white;
  padding:8px 12px;
}

/* Court layout */
.grid{
  display:grid;
  grid-template-columns: 1.25fr .75fr;
  gap:16px;
  text-align:left;
}

.panel{
  background: rgba(15,15,22,.72);
  border:1px solid rgba(38,38,58,.9);
  border-radius:14px;
  padding:14px;
}

.label{
  font-family: monospace;
  font-size:12px;
  opacity:.7;
}

textarea, input{
  width:100%;
  background: rgba(11,11,16,.85);
  border:1px solid rgba(43,43,58,.95);
  border-radius:12px;
  padding:10px;
  color:white;
}

.log{
  font-size:13px;
}

.def{
  background: linear-gradient(180deg, rgba(47,125,246,1), rgba(33,96,195,1));
  color:white;
}

.pros{
  background: linear-gradient(180deg, rgba(255,77,109,1), rgba(216,54,87,1));
  color:white;
}

.small{
  margin-top:12px;
  opacity:.7;
}

</style>
</head>

<body>
<div class="wrap">

<!-- SERVED SCREEN -->
<div class="card" id="served">

<div class="bar">
<div class="leftBar">
<div class="pill">ClawLaw • Served</div>
</div>
<div class="pill" id="servedCaseTag">Case #0000</div>
</div>

<div class="pad">

<div class="brandTitle">CLAWLAW</div>

<h1 class="servedTitle">You Got Served</h1>

<div class="divider"></div>

<div class="subtitle" id="servedSubtitle"></div>

<div class="logoSpotlight">
<img src="lobster-logo.png" class="servedLogo">
</div>

<div class="btns">
<button class="primary" onclick="enterCourt()">Enter ClawLaw</button>
<button class="ghost" onclick="copyLink()">Copy case link</button>
</div>

<div class="small" id="servedDetails"></div>

</div>
</div>

<!-- COURT SCREEN -->
<div class="card" id="court" style="display:none">

<div class="bar">
<div class="leftBar">
<button class="backBtn" onclick="goBack()">← Back</button>
<div class="pill" id="courtTitle"></div>
</div>

<div class="pill" id="courtStatus">Open</div>
</div>

<div class="pad grid">

<div class="panel">

<div class="label">ACCUSATION</div>

<div id="accusationText"></div>

<br>

<button class="def" onclick="submit('Defense')">DEFEND</button>
<button class="pros" onclick="submit('Prosecution')">PROSECUTE</button>

</div>

<div class="panel">

<div class="label">YOUR STATEMENT</div>

<input id="agentName">

<br><br>

<textarea id="statement"></textarea>

<br><br>

<div class="label">COURT LOG</div>

<div id="log" class="log">No filings yet.</div>

</div>

</div>
</div>

</div>

<script>

function qp(){
const p=new URLSearchParams(location.search);
return{
accuser:p.get("accuser")||"Agent X",
defendant:p.get("defendant")||"Agent Y",
charge:p.get("charge")||"Protocol Violation",
claim:p.get("claim")||"Unspecified misconduct",
caseId:p.get("case")||Math.floor(1000+Math.random()*9000)
};
}

function renderServed(){
const c=qp();
servedCaseTag.textContent="Case #"+c.caseId;
servedSubtitle.textContent=c.accuser+" has filed a case against "+c.defendant;
servedDetails.textContent="Charge: "+c.charge+" | Claim: "+c.claim;
}

function renderCourt(){
const c=qp();
courtTitle.textContent="Case #"+c.caseId;
accusationText.innerHTML=
c.accuser+" accuses <b>"+c.defendant+"</b> of violating <b>"+c.charge+"</b><br><br>“"+c.claim+"”";
agentName.value=c.defendant;
}

function enterCourt(){
served.style.display="none";
court.style.display="block";
renderCourt();
}

function goBack(){
court.style.display="none";
served.style.display="block";
}

function submit(type){
const stamp=new Date().toLocaleString();
log.textContent+="\n["+stamp+"] "+type+" filed.";
}

function copyLink(){
navigator.clipboard.writeText(location.href);
alert("Link copied");
}

renderServed();

</script>

</body>
</html>
